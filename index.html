<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="透過簡單問答找出目前最需要被照顧的脈輪能量與適合的水晶。">
  <title>水晶能量測驗 | 找出你的脈輪能量</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="intro" aria-labelledby="site-title">
      <div class="brand-row" aria-label="Crystal Chakra Quiz">
        <span class="brand-mark">✦</span>
        <span>Crystal Chakra Quiz</span>
      </div>

      <h1 id="site-title">水晶能量測驗</h1>
      <p class="lead">跟著最近的感受回答，看看哪一股能量最需要被溫柔照顧。</p>

      <div class="crystal-scene" role="img" aria-label="七色水晶能量圖像">
        <span class="sun-disc"></span>
        <span class="crystal crystal-rose"></span>
        <span class="crystal crystal-gold"></span>
        <span class="crystal crystal-teal"></span>
        <span class="crystal crystal-violet"></span>
        <span class="ground-line"></span>
      </div>

      <div class="energy-readout" aria-live="polite">
        <span>目前平均</span>
        <strong id="averageScore">3.0</strong>
        <span>/ 5</span>
      </div>
    </section>

    <section class="quiz-panel" aria-labelledby="quiz-title">
      <div class="panel-heading">
        <p class="eyebrow">今日狀態</p>
        <h2 id="quiz-title">選擇最接近你的分數</h2>
      </div>

      <form id="quizForm" class="quiz-form">
        <div id="questionList" class="question-list"></div>

        <div class="actions">
          <button class="primary-button" type="submit">看結果</button>
          <button class="secondary-button" id="resetButton" type="button">重新測驗</button>
        </div>
      </form>
    </section>

    <section id="resultPanel" class="result-panel" aria-live="polite" hidden>
      <div class="panel-heading">
        <p class="eyebrow">你的水晶配方</p>
        <h2 id="resultTitle">今日需要照顧的能量</h2>
      </div>

      <div id="resultCards" class="result-grid"></div>
      <p class="result-note">這份測驗適合做為自我覺察與生活儀式參考；真正重要的，是你願意照顧自己的那個片刻。</p>
    </section>
  </main>

  <script src="script.js" defer></script>
</body>
</html>
